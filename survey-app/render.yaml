databases:
  - name: poster-survey-db
    plan: free
    databaseName: poster_survey
    user: poster_survey

services:
  - type: web
    name: poster-survey
    runtime: node
    plan: free
    rootDir: survey-app
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: poster-survey-db
          property: connectionString
